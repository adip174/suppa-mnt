<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPPA MAINTENANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // KONFIGURASI API (WAJIB DIISI)
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxEsVHunFmbzM6JEdHdBwwmRx8m69c0AVGvTtou3OCsAvW5_8NjQh1pKfiEOp-JiybtTA/exec"; 
        const MAX_CAPACITY_MW = 10.367; // Daya Mampu per Engine (MW)

        function App() {
            const [engines, setEngines] = useState([]);
            const [isLoadingData, setIsLoadingData] = useState(true);
            const [isSaving, setIsSaving] = useState(false);

            const [mode, setMode] = useState('actual'); 
            const [activePage, setActivePage] = useState('minor'); // 'minor' | 'major'
            const [globalCF, setGlobalCF] = useState(80);
            const [useGlobalCF, setUseGlobalCF] = useState(true);
            
            // Authentication State
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [pendingAction, setPendingAction] = useState(null);
            const [loginError, setLoginError] = useState("");

            // Modal States
            const [showInputModal, setShowInputModal] = useState(false);
            const [showSetupModal, setShowSetupModal] = useState(false);
            const [setupSelectedId, setSetupSelectedId] = useState(1);
            const [inputMode, setInputMode] = useState('total'); // 'total' | 'daily'
            
            const setupEngineData = useMemo(() => engines.find(e => e.id === setupSelectedId), [engines, setupSelectedId]);

            // Default Tanggal Kemarin (H-1) untuk Form Input
            const defaultDateStr = useMemo(() => {
                const d = new Date();
                d.setDate(d.getDate() - 1);
                return d.toISOString().split('T')[0];
            }, []);

            // ==========================================
            // FETCH DATA DARI GOOGLE APPS SCRIPT
            // ==========================================
            const fetchEngineData = async () => {
                if (GAS_URL === "URL_GAS_ANDA_DISINI") {
                    console.warn("GAS_URL belum disetting. Harap ganti URL di kode sumber.");
                    setIsLoadingData(false);
                    return;
                }

                setIsLoadingData(true);
                try {
                    const response = await fetch(GAS_URL);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        // Memaksa struktur grafik selalu 7 hari yang lalu sampai kemarin
                        const enhancedData = result.data.map(eng => {
                            const fixedHistory = Array.from({length: 7}, (_, i) => {
                                const d = new Date();
                                d.setDate(d.getDate() - (7 - i)); // i=6 adalah Kemarin
                                const dateStr = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
                                
                                // Cocokkan jika backend mengirim data di tanggal ini
                                const existingLog = (eng.history || []).find(h => h.date === dateStr);
                                
                                return {
                                    date: dateStr,
                                    runHours: existingLog ? existingLog.runHours : 0 
                                };
                            });
                            
                            eng.history = fixedHistory;
                            // Default load jika tidak ada
                            eng.load = eng.load || MAX_CAPACITY_MW;
                            
                            // Jika backend belum support interval baru, berikan nilai default 0 agar tidak error
                            if(!eng.lastPMS) eng.lastPMS = {};
                            [500, 1000, 4000, 12000, 24000, 36000, 48000, 60000, 72000].forEach(int => {
                                if(eng.lastPMS[int] === undefined) eng.lastPMS[int] = 0;
                            });

                            return eng;
                        });
                        setEngines(enhancedData);
                        if(enhancedData.length > 0 && !setupSelectedId) setSetupSelectedId(enhancedData[0].id);
                    } else {
                        console.error("Gagal mengambil data dari GAS:", result.message);
                        alert("Gagal mengambil data dari Database Sheets.");
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                } finally {
                    setIsLoadingData(false);
                }
            };

            useEffect(() => {
                fetchEngineData();
            }, []);

            // ==========================================
            // LOGIKA PERHITUNGAN MAINTENANCE
            // ==========================================
            const calculateMaintenance = (engine) => {
                const intervals = [500, 1000, 4000, 12000, 24000, 36000, 48000, 60000, 72000];
                let results = {};

                let dailyRH = engine.avgDailyRH;
                
                // KALKULASI MODE SIMULASI (CF & BEBAN AKTUAL)
                if (mode === 'simulation') {
                    const activeCF = useGlobalCF ? globalCF : engine.cf;
                    const currentLoad = engine.load || MAX_CAPACITY_MW;
                    
                    // Rumus: Daily RH = (Target CF / 100) * 24 jam * (Kapasitas Maks / Beban Aktual)
                    // Mesin harus menyala lebih lama jika beban aktual lebih rendah dari kapasitas maks untuk capai target CF yg sama.
                    const requiredRH = (activeCF / 100) * 24 * (MAX_CAPACITY_MW / currentLoad);
                    
                    // Maksimal jam menyala dalam sehari adalah 24 jam
                    dailyRH = Math.min(24, requiredRH);
                }

                intervals.forEach(interval => {
                    let last = engine.lastPMS[interval] || 0;
                    let next = last + interval;

                    const remaining = next - engine.currentRH;
                    const isOverdue = remaining < 0;

                    const daysToPMS = dailyRH > 0 ? (remaining / dailyRH) : Infinity;
                    
                    const estDate = new Date();
                    estDate.setDate(estDate.getDate() + Math.ceil(daysToPMS));

                    let deviasiHari = 0;
                    let dateAktualStr = "";
                    if (mode === 'simulation') {
                        const daysToPmsAktual = engine.avgDailyRH > 0 ? (remaining / engine.avgDailyRH) : Infinity;
                        deviasiHari = Math.ceil(daysToPmsAktual) - Math.ceil(daysToPMS);
                        
                        const dateAktual = new Date();
                        dateAktual.setDate(dateAktual.getDate() + Math.ceil(daysToPmsAktual));
                        dateAktualStr = dateAktual.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                    }

                    results[interval] = {
                        last, next, remaining, daysToPMS,
                        isOverdue,
                        estDate: estDate.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }),
                        status: isOverdue ? 'overdue' : remaining < 100 ? 'danger' : remaining < 250 ? 'warning' : 'safe',
                        deviasiHari, dateAktualStr
                    };
                });

                return { ...engine, pms: results, activeDailyRH: dailyRH };
            };

            const processedEngines = engines.map(calculateMaintenance);

            // Tentukan interval mana yang dirender berdasarkan Page yang aktif
            const displayedIntervals = activePage === 'minor' 
                ? [500, 1000, 4000] 
                : [12000, 24000, 36000, 48000, 60000, 72000];

            // ==========================================
            // HANDLERS
            // ==========================================
            const handleSecureAction = (action) => {
                if (isAuthenticated) {
                    if (action === 'setup') setShowSetupModal(true);
                    if (action === 'input') setShowInputModal(true);
                } else {
                    setPendingAction(action);
                    setShowLoginModal(true);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                if (formData.get('username') === 'admin' && formData.get('password') === 'mitiew') {
                    setIsAuthenticated(true); setShowLoginModal(false); setLoginError("");
                    if (pendingAction === 'setup') setShowSetupModal(true);
                    if (pendingAction === 'input') setShowInputModal(true);
                    setPendingAction(null);
                } else {
                    setLoginError("Username atau password salah!");
                }
            };

            const handleLogout = () => { setIsAuthenticated(false); alert("Logout berhasil."); };

            // SUBMIT DATA BATCH KE APPS SCRIPT
            const handleInputRH = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const inputDate = formData.get('inputDate');
                
                // Deteksi apakah user mengisi tanggal lampau (sebelum hari ini)
                const inputDateObj = new Date(inputDate);
                const todayObj = new Date();
                todayObj.setHours(0,0,0,0);
                inputDateObj.setHours(0,0,0,0);
                const isPastDate = inputDateObj < todayObj;
                
                const batchPayload = [];

                // Loop melalui semua engine untuk mengecek isian form
                for (const targetEngine of engines) {
                    const valRaw = formData.get(`val_${targetEngine.id}`);
                    
                    let newRH = targetEngine.currentRH; 
                    let dailyRun = 0;
                    
                    if (valRaw) {
                        const val = parseFloat(valRaw);
                        if (inputMode === 'total') {
                            newRH = val;
                            dailyRun = newRH - targetEngine.currentRH;
                        } else {
                            dailyRun = val;
                            newRH = targetEngine.currentRH + dailyRun;
                        }
                    }

                    if (!isPastDate && valRaw) {
                        if (dailyRun < 0) return alert(`Error pada ${targetEngine.name}: Nilai tidak boleh negatif / turun!`);
                        if (dailyRun > 24) return alert(`Error pada ${targetEngine.name}: Kenaikan RH maksimal 24 jam/hari! (Tercatat: ${dailyRun.toFixed(1)} jam)`);
                    }

                    batchPayload.push({
                        engineName: targetEngine.name,
                        newRH: newRH
                    });
                }

                if (batchPayload.length === 0) return alert("Terjadi kesalahan sistem pengisian.");

                setIsSaving(true);
                
                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'inputRHBatch',
                            payload: { date: inputDate, data: batchPayload }
                        })
                    });
                    const result = await response.json();
                    
                    if(result.status === 'success'){
                        setShowInputModal(false);
                        await fetchEngineData(); 
                    } else {
                        alert("Gagal menyimpan data: " + result.message);
                    }
                } catch (error) {
                    alert("Terjadi kesalahan jaringan.");
                    console.error(error);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleSetupEngine = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const engId = parseInt(formData.get('setupEngineId'));
                const targetEngine = engines.find(eng => eng.id === engId);

                const payload = {
                    engineName: targetEngine.name,
                    date: formData.get('setupDate'),
                    newRH: parseFloat(formData.get('setupRH')),
                    pms500: parseFloat(formData.get('setupPMS500') || 0),
                    pms1000: parseFloat(formData.get('setupPMS1000') || 0),
                    pms4000: parseFloat(formData.get('setupPMS4000') || 0),
                    pms12000: parseFloat(formData.get('setupPMS12000') || 0),
                    pms24000: parseFloat(formData.get('setupPMS24000') || 0),
                    pms36000: parseFloat(formData.get('setupPMS36000') || 0),
                    pms48000: parseFloat(formData.get('setupPMS48000') || 0),
                    pms60000: parseFloat(formData.get('setupPMS60000') || 0),
                    pms72000: parseFloat(formData.get('setupPMS72000') || 0),
                };

                setIsSaving(true);

                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'setupEngine', payload: payload })
                    });
                    const result = await response.json();

                    if(result.status === 'success'){
                        setShowSetupModal(false);
                        await fetchEngineData();
                    } else {
                        alert("Gagal menyimpan setup: " + result.message);
                    }
                } catch (error) {
                    alert("Terjadi kesalahan jaringan.");
                } finally {
                    setIsSaving(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-slate-900 text-white shadow-lg sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <i className="fas fa-industry text-2xl text-blue-400"></i>
                                <div>
                                    <div className="flex items-center space-x-2">
                                        <h1 className="text-xl font-bold leading-tight">SUPPA MAINTENANCE</h1>
                                        {isAuthenticated && <span className="bg-blue-600 text-[10px] px-2 py-0.5 rounded uppercase font-bold tracking-wider">Admin</span>}
                                    </div>
                                    <p className="text-xs text-slate-400">Next.js/Vercel + GAS Backend</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center space-x-4">
                                <div className="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                                    <button onClick={() => setMode('actual')} className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${mode === 'actual' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'}`} >
                                        <i className="fas fa-clock mr-2"></i> Mode Aktual
                                    </button>
                                    <button onClick={() => setMode('simulation')} className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${mode === 'simulation' ? 'bg-emerald-600 text-white shadow' : 'text-slate-400 hover:text-white'}`} >
                                        <i className="fas fa-flask mr-2"></i> Mode Simulasi CF
                                    </button>
                                </div>
                                {isAuthenticated && (
                                    <button onClick={handleLogout} className="text-slate-400 hover:text-rose-400 transition-colors text-sm" title="Logout Admin">
                                        <i className="fas fa-sign-out-alt"></i>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full relative">
                        {isLoadingData && (
                            <div className="absolute inset-0 bg-f3f4f6 z-20 flex flex-col items-center justify-center pt-20">
                                <div className="loader mb-4 border-blue-500"></div>
                                <p className="text-slate-500 font-medium animate-pulse">Menghubungkan ke Google Sheets...</p>
                            </div>
                        )}

                        {GAS_URL === "URL_GAS_ANDA_DISINI" && (
                            <div className="bg-rose-100 border border-rose-400 text-rose-700 px-4 py-3 rounded relative mb-6">
                                <strong className="font-bold">Perhatian: </strong>
                                <span className="block sm:inline">Aplikasi belum terhubung ke database. Harap isi <code className="bg-rose-200 px-1 rounded">GAS_URL</code> di dalam file <code>index.html</code> dengan link dari deployment Google Apps Script Anda.</span>
                            </div>
                        )}

                        {mode === 'simulation' && (
                            <div className="bg-white rounded-xl shadow-sm border border-emerald-200 p-5 mb-6 animate-fade-in flex flex-wrap gap-6 items-end">
                                <div className="w-full">
                                    <h2 className="text-lg font-semibold text-emerald-800 mb-1"><i className="fas fa-sliders-h mr-2"></i> Parameter Simulasi (Daya Mampu Mesin = 10.3 MW)</h2>
                                    <p className="text-sm text-slate-500">Masukkan target CF dan beban operasi per mesin untuk memproyeksikan hari pencapaian maintenance. <b>Mesin dengan beban rendah harus menyala lebih lama untuk mencapai target CF yang sama.</b></p>
                                </div>
                                
                                <div className="flex items-center space-x-4">
                                    <label className="flex items-center space-x-2 text-sm font-medium text-slate-700">
                                        <input type="radio" checked={useGlobalCF} onChange={() => setUseGlobalCF(true)} className="text-emerald-600 focus:ring-emerald-500" />
                                        <span>Gunakan Target CF Global</span>
                                    </label>
                                    <div className="flex items-center bg-slate-100 rounded-md px-3 py-2">
                                        <input type="number" min="0" max="100" value={globalCF} onChange={(e) => setGlobalCF(e.target.value)} disabled={!useGlobalCF} className="w-16 bg-transparent text-right font-bold text-emerald-700 outline-none disabled:opacity-50" />
                                        <span className="ml-1 text-slate-500 font-bold">%</span>
                                    </div>
                                    <p className="text-xs text-emerald-600 ml-2 italic">(Target Bulanan / Tahunan)</p>
                                </div>

                                <div className="flex items-center space-x-4">
                                    <label className="flex items-center space-x-2 text-sm font-medium text-slate-700">
                                        <input type="radio" checked={!useGlobalCF} onChange={() => setUseGlobalCF(false)} className="text-emerald-600 focus:ring-emerald-500" />
                                        <span>Gunakan Target CF Per Engine</span>
                                    </label>
                                </div>
                            </div>
                        )}

                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                            <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                                <h2 className="text-2xl font-bold text-slate-800">Status Engine</h2>
                                
                                {/* Navigasi PMS Minor / Major */}
                                <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                                    <button 
                                        onClick={() => setActivePage('minor')}
                                        className={`px-4 py-1.5 text-sm font-bold rounded-md transition-colors ${activePage === 'minor' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        PMS Minor
                                    </button>
                                    <button 
                                        onClick={() => setActivePage('major')}
                                        className={`px-4 py-1.5 text-sm font-bold rounded-md transition-colors ${activePage === 'major' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        PMS Major
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex space-x-3">
                                <button onClick={() => handleSecureAction('setup')} className="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded-lg shadow text-sm font-medium transition-colors" disabled={isLoadingData}>
                                    {isAuthenticated ? <i className="fas fa-cog mr-2"></i> : <i className="fas fa-lock mr-2"></i>} Setup Awal
                                </button>
                                <button onClick={() => fetchEngineData()} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg shadow text-sm font-medium transition-colors" disabled={isLoadingData}>
                                    <i className="fas fa-sync-alt mr-2"></i> Sinkronisasi Data
                                </button>
                                <button onClick={() => handleSecureAction('input')} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow text-sm font-medium transition-colors" disabled={isLoadingData}>
                                    {isAuthenticated ? <i className="fas fa-plus mr-2"></i> : <i className="fas fa-lock mr-2"></i>} Input Daily RH
                                </button>
                            </div>
                        </div>

                        {/* ENGINE CARDS GRID */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {processedEngines.map(engine => (
                                <div key={engine.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow flex flex-col">
                                    <div className="bg-slate-50 border-b border-slate-200 px-5 py-4">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800">{engine.name}</h3>
                                                <p className="text-xs font-medium text-slate-500 mt-1">
                                                    Avg Run: <span className="text-blue-600" title="Rata-rata dari input operasi harian">
                                                        {engine.activeDailyRH >= 24 ? "24 (Maks)" : engine.activeDailyRH.toFixed(1)} jam/hari
                                                    </span>
                                                </p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-xs text-slate-500 uppercase tracking-wider font-semibold">Aktual RH</p>
                                                <p className="text-xl font-black text-slate-800">{engine.currentRH.toLocaleString('id-ID', {maximumFractionDigits:1})}</p>
                                            </div>
                                        </div>

                                        {/* TAMPILAN KONTROL SIMULASI DI DALAM CARD */}
                                        {mode === 'simulation' && (
                                            <div className="mt-3 bg-emerald-50 rounded p-2 border border-emerald-100 flex flex-wrap gap-2 text-xs">
                                                <div className="flex items-center w-full justify-between mb-1">
                                                    <span className="font-semibold text-emerald-800">Beban Operasi:</span>
                                                    <div className="flex items-center">
                                                        <input 
                                                            type="number" step="0.1" max={MAX_CAPACITY_MW} min="0.1"
                                                            value={engine.load} 
                                                            onChange={(e) => setEngines(prev => prev.map(en => en.id === engine.id ? {...en, load: parseFloat(e.target.value) || 0} : en))} 
                                                            className="w-16 px-1 py-0.5 rounded border border-emerald-200 outline-none text-center font-mono font-bold text-emerald-700" 
                                                        />
                                                        <span className="ml-1 text-emerald-600 font-medium">MW</span>
                                                    </div>
                                                </div>
                                                {!useGlobalCF && (
                                                    <div className="flex items-center w-full justify-between">
                                                        <span className="font-semibold text-emerald-800">Target CF:</span>
                                                        <div className="flex items-center">
                                                            <input 
                                                                type="number" min="0" max="100"
                                                                value={engine.cf} 
                                                                onChange={(e) => setEngines(prev => prev.map(en => en.id === engine.id ? {...en, cf: parseFloat(e.target.value) || 0} : en))} 
                                                                className="w-16 px-1 py-0.5 rounded border border-emerald-200 outline-none text-center font-mono font-bold text-emerald-700" 
                                                            />
                                                            <span className="ml-1 text-emerald-600 font-medium">%</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    <div className="p-5 flex-grow flex flex-col space-y-5">
                                        {/* Render Interval Berdasarkan Halaman yang Aktif */}
                                        <div className="space-y-5 flex-grow">
                                            {displayedIntervals.map(interval => {
                                                const pms = engine.pms[interval];
                                                const barColor = pms.isOverdue ? 'bg-red-600' : pms.status === 'danger' ? 'bg-rose-500' : pms.status === 'warning' ? 'bg-amber-400' : 'bg-blue-500';
                                                const textColor = pms.isOverdue ? 'text-red-700' : pms.status === 'danger' ? 'text-rose-600' : pms.status === 'warning' ? 'text-amber-600' : 'text-slate-600';
                                                const progress = pms.isOverdue ? 100 : Math.min(100, Math.max(0, ((interval - pms.remaining) / interval) * 100));

                                                // Formatting penamaan interval (misal 12000 -> 12K)
                                                const displayLabel = interval >= 1000 ? `${interval/1000}K` : interval;

                                                return (
                                                    <div key={interval} className="relative">
                                                        <div className="flex justify-between items-end mb-1">
                                                            <span className="text-sm font-bold text-slate-700">PMS {displayLabel}</span>
                                                            <div className="text-right">
                                                                {pms.isOverdue ? (
                                                                    <span className={`text-sm font-black ${textColor} flex items-center animate-pulse`}>
                                                                        <i className="fas fa-exclamation-triangle mr-1"></i> LEWAT {Math.abs(pms.remaining).toFixed(0)} jam
                                                                    </span>
                                                                ) : (
                                                                    <span className={`text-sm font-black ${textColor}`}>Sisa {pms.remaining.toFixed(0)} jam</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                        <div className="w-full bg-slate-100 rounded-full h-2.5 mb-2 overflow-hidden border border-slate-200">
                                                            <div className={`h-2.5 rounded-full ${barColor} transition-all duration-500`} style={{ width: `${progress}%` }}></div>
                                                        </div>
                                                        <div className="flex justify-between text-[11px] text-slate-500 mt-1">
                                                            <span>Target RH: <b>{pms.next.toLocaleString('id-ID')}</b></span>
                                                            <div className="text-right">
                                                                <span className="block font-medium">
                                                                    {pms.isOverdue ? 'Terlewat pd: ' : 'Est: '} 
                                                                    <span className={`font-bold ${pms.isOverdue ? 'text-red-600' : 'text-slate-800'}`}>{pms.estDate}</span>
                                                                </span>
                                                                {mode === 'simulation' && (
                                                                    <span className={`block mt-0.5 ${pms.deviasiHari < 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                                        <i className={`fas fa-caret-${pms.deviasiHari < 0 ? 'up' : 'down'} mr-1`}></i>
                                                                        {Math.abs(pms.deviasiHari)} hari vs Aktual ({pms.dateAktualStr})
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>

                                        {/* Grafik Jam Operasi (HANYA TAMPIL DI PMS MINOR) */}
                                        {activePage === 'minor' && (
                                            <div className="mt-6 pt-5 border-t border-slate-100">
                                                <h4 className="text-xs font-bold text-slate-700 mb-3 flex items-center">
                                                    <i className="fas fa-chart-line mr-2 text-blue-500"></i> Trend Operasi Harian
                                                </h4>
                                                <div className="w-full h-40 bg-white rounded-lg p-2 border border-slate-200 shadow-inner">
                                                    <svg viewBox="0 0 280 120" className="w-full h-full overflow-visible">
                                                        {/* Garis Grid Horizontal (0, 12, 24 jam) */}
                                                        <line x1="20" y1="20" x2="260" y2="20" stroke="#f1f5f9" strokeWidth="1" />
                                                        <text x="15" y="24" fontSize="8" fill="#94a3b8" textAnchor="end">24</text>
                                                        
                                                        <line x1="20" y1="50" x2="260" y2="50" stroke="#f1f5f9" strokeWidth="1" />
                                                        <text x="15" y="54" fontSize="8" fill="#94a3b8" textAnchor="end">12</text>
                                                        
                                                        <line x1="20" y1="80" x2="260" y2="80" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="2" />
                                                        <text x="15" y="84" fontSize="8" fill="#94a3b8" textAnchor="end">0</text>
                                                        
                                                        {/* Garis Line Chart */}
                                                        <polyline 
                                                            fill="none" 
                                                            stroke="#2563eb" 
                                                            strokeWidth="2.5" 
                                                            strokeLinecap="round"
                                                            strokeLinejoin="round"
                                                            points={engine.history && engine.history.map((day, idx) => {
                                                                const x = 30 + (idx * 38);
                                                                const y = 80 - ((day.runHours || 0) / 24) * 60;
                                                                return `${x},${y}`;
                                                            }).join(" ")} 
                                                        />
                                                        
                                                        {/* Titik dan Label */}
                                                        {engine.history && engine.history.map((day, idx) => {
                                                            const x = 30 + (idx * 38);
                                                            const y = 80 - ((day.runHours || 0) / 24) * 60;
                                                            return (
                                                                <g key={idx} className="group">
                                                                    <circle cx={x} cy={y} r="4" fill="#ffffff" stroke="#2563eb" strokeWidth="2" />
                                                                    <text x={x} y={y - 10} textAnchor="middle" fontSize="10" fill="#1e293b" fontWeight="bold">
                                                                        {day.runHours > 0 ? day.runHours.toFixed(1) : '0'}
                                                                    </text>
                                                                    <text x={x} y="100" textAnchor="middle" fontSize="9" fill="#64748b">
                                                                        {day.date}
                                                                    </text>
                                                                </g>
                                                            );
                                                        })}
                                                    </svg>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* MODALS AREA */}
                    
                    {/* Modal Login */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden">
                                <div className="bg-slate-800 px-6 py-4 flex justify-between items-center">
                                    <h3 className="text-white font-bold text-lg"><i className="fas fa-lock mr-2 text-slate-400"></i>Otorisasi Admin</h3>
                                    <button onClick={() => {setShowLoginModal(false); setPendingAction(null);}} className="text-slate-400 hover:text-white"><i className="fas fa-times"></i></button>
                                </div>
                                <form onSubmit={handleLogin} className="p-6 space-y-4">
                                    {loginError && (<div className="bg-rose-50 text-rose-600 text-sm p-3 rounded-lg border border-rose-100 flex items-center"><i className="fas fa-exclamation-circle mr-2"></i> {loginError}</div>)}
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Username</label><input type="text" name="username" required autoFocus className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Password</label><input type="password" name="password" required className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                                    <div className="pt-4"><button type="submit" className="w-full px-4 py-2 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow transition-colors">Login & Lanjutkan</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Input Daily RH (Batch) */}
                    {showInputModal && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col" style={{maxHeight: '90vh'}}>
                                <div className="bg-slate-800 px-6 py-4 flex justify-between items-center shrink-0">
                                    <h3 className="text-white font-bold text-lg">Input RH Harian (Aktual)</h3>
                                    <button onClick={() => setShowInputModal(false)} className="text-slate-400 hover:text-white"><i className="fas fa-times"></i></button>
                                </div>
                                <form onSubmit={handleInputRH} className="p-6 space-y-4 overflow-y-auto custom-scrollbar">
                                    <div className="mb-4">
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Tanggal Input</label>
                                        <input type="date" name="inputDate" required defaultValue={defaultDateStr} className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>

                                    {/* Toggle Mode Input */}
                                    <div className="flex gap-4 mb-4 bg-slate-50 p-3 rounded-lg border border-slate-200">
                                        <label className="flex items-center space-x-2 text-sm font-medium text-slate-700 cursor-pointer">
                                            <input type="radio" checked={inputMode === 'total'} onChange={() => setInputMode('total')} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                                            <span>Input Total RH</span>
                                        </label>
                                        <label className="flex items-center space-x-2 text-sm font-medium text-slate-700 cursor-pointer">
                                            <input type="radio" checked={inputMode === 'daily'} onChange={() => setInputMode('daily')} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                                            <span>Input Jam Operasi</span>
                                        </label>
                                    </div>
                                    
                                    <div className="space-y-3 pt-2 border-t">
                                        <div className="flex text-xs font-bold text-slate-500 mb-2 px-1">
                                            <div className="w-1/3">NAMA MESIN</div>
                                            <div className="w-1/3 text-center">RH TERAKHIR</div>
                                            <div className="w-1/3 pl-2">{inputMode === 'total' ? 'INPUT RH BARU' : 'JAM OPERASI'}</div>
                                        </div>
                                        
                                        {engines.map(engine => (
                                            <div key={engine.id} className="flex items-center bg-slate-50 p-2 rounded-lg border border-slate-200">
                                                <label className="w-1/3 text-sm font-bold text-slate-700">{engine.name}</label>
                                                <div className="w-1/3 text-center text-sm font-mono text-slate-500">
                                                    {engine.currentRH.toLocaleString('id-ID', {maximumFractionDigits:1})}
                                                </div>
                                                <div className="w-1/3">
                                                    <input 
                                                        type="number" 
                                                        step="0.1" 
                                                        name={`val_${engine.id}`} 
                                                        placeholder={inputMode === 'total' ? "Kosongkan jika off" : "Maks 24 jam..."} 
                                                        className="w-full border border-slate-300 rounded px-2 py-1.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold text-blue-700 placeholder-slate-400" 
                                                    />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="pt-4 flex justify-end space-x-3 border-t mt-4">
                                        <button type="button" onClick={() => setShowInputModal(false)} className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg" disabled={isSaving}>Batal</button>
                                        <button type="submit" className="flex items-center px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow" disabled={isSaving}>
                                            {isSaving ? <span className="loader mr-2 w-4 h-4 border-2"></span> : "Simpan Batch Data"}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Setup (Ditambah Grid Interval Major) */}
                    {showSetupModal && setupEngineData && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col" style={{maxHeight: '90vh'}}>
                                <div className="bg-slate-800 px-6 py-4 flex justify-between items-center shrink-0">
                                    <h3 className="text-white font-bold text-lg">Setup Data Awal Engine</h3>
                                    <button onClick={() => setShowSetupModal(false)} className="text-slate-400 hover:text-white"><i className="fas fa-times"></i></button>
                                </div>
                                <form key={`setup-${setupEngineData.id}`} onSubmit={handleSetupEngine} className="p-6 space-y-4 overflow-y-auto custom-scrollbar">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tanggal Setup</label>
                                            <input type="date" name="setupDate" required defaultValue={defaultDateStr} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none text-sm" />
                                        </div>
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Pilih Engine</label>
                                            <select name="setupEngineId" value={setupSelectedId} onChange={(e) => setSetupSelectedId(parseInt(e.target.value))} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none text-sm">
                                                {engines.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 mb-2">
                                        <label className="block text-sm font-bold text-blue-800 mb-1">RH Aktual Saat Ini</label>
                                        <input type="number" step="0.1" name="setupRH" required defaultValue={setupEngineData.currentRH} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none font-bold" />
                                    </div>

                                    <div className="grid grid-cols-3 gap-3">
                                        <div className="col-span-3 font-bold text-slate-700 border-b pb-1 text-sm mt-1">Histori PMS Minor (RH Terakhir)</div>
                                        <div><label className="block text-[11px] font-bold text-slate-500 mb-1">Last 500</label><input type="number" step="0.1" name="setupPMS500" defaultValue={setupEngineData.lastPMS[500]} className="w-full border rounded-lg px-2 py-1.5 outline-none text-sm" /></div>
                                        <div><label className="block text-[11px] font-bold text-slate-500 mb-1">Last 1000</label><input type="number" step="0.1" name="setupPMS1000" defaultValue={setupEngineData.lastPMS[1000]} className="w-full border rounded-lg px-2 py-1.5 outline-none text-sm" /></div>
                                        <div><label className="block text-[11px] font-bold text-slate-500 mb-1">Last 4000</label><input type="number" step="0.1" name="setupPMS4000" defaultValue={setupEngineData.lastPMS[4000]} className="w-full border rounded-lg px-2 py-1.5 outline-none text-sm" /></div>

                                        <div className="col-span-3 font-bold text-slate-700 border-b pb-1 text-sm mt-2">Histori PMS Major (RH Terakhir)</div>
                                        <div><label className="block text-[11px] font-bold text-slate-500 mb-1">Last 12K</label><input type="number" step="0.1" name="setupPMS12000" defaultValue={setupEngineData.lastPMS[12000]} className="w-full border rounded-lg px-2 py-1.5 outline-none text-sm" /></div>
                                        <div><label className="block text-[11px] font-bold text-slate-500 mb-1">Last 24K</label><input type="number" step="0.1" name="setupPMS24000" defaultValue={setupEngineData.lastPMS[24000]} className="w-full border rounded-lg px-2 py-1.5 outline-none text-sm" /></div>
                                        <div><label className="block text-[11px] font-bold text-slate-500 mb-1">Last 36K</label><input type="number" step="0.1" name="setupPMS36000" defaultValue={setupEngineData.lastPMS[36000]} className="w-full border rounded-lg px-2 py-1.5 outline-none text-sm" /></div>
                                        <div><label className="block text-[11px] font-bold text-slate-500 mb-1">Last 48K</label><input type="number" step="0.1" name="setupPMS48000" defaultValue={setupEngineData.lastPMS[48000]} className="w-full border rounded-lg px-2 py-1.5 outline-none text-sm" /></div>
                                        <div><label className="block text-[11px] font-bold text-slate-500 mb-1">Last 60K</label><input type="number" step="0.1" name="setupPMS60000" defaultValue={setupEngineData.lastPMS[60000]} className="w-full border rounded-lg px-2 py-1.5 outline-none text-sm" /></div>
                                        <div><label className="block text-[11px] font-bold text-slate-500 mb-1">Last 72K</label><input type="number" step="0.1" name="setupPMS72000" defaultValue={setupEngineData.lastPMS[72000]} className="w-full border rounded-lg px-2 py-1.5 outline-none text-sm" /></div>
                                    </div>
                                    
                                    <div className="pt-4 flex justify-end space-x-3 border-t border-slate-100 mt-4">
                                        <button type="button" onClick={() => setShowSetupModal(false)} className="px-4 py-2 text-sm text-slate-600 bg-slate-100 rounded-lg" disabled={isSaving}>Batal</button>
                                        <button type="submit" className="flex items-center px-4 py-2 text-sm font-medium text-white bg-slate-800 hover:bg-slate-900 rounded-lg shadow" disabled={isSaving}>
                                            {isSaving ? <span className="loader mr-2 w-4 h-4 border-2"></span> : "Simpan Setup"}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
